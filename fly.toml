app = "viberouter"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "20128"
  HOSTNAME = "0.0.0.0"
  HOME = "/data"
  NEXT_PUBLIC_BASE_URL = "https://viberouter.fly.dev"

[http_service]
  internal_port = 20128
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  interval = "30s"
  timeout = "10s"
  grace_period = "120s"
  method = "get"
  path = "/v1/models"

[[mounts]]
  source = "data"
  destination = "/data"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
